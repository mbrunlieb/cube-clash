<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚔️ Cube Clash</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Lobby ── */
    .lobby {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .lobby h1 {
      font-size: 2.5rem;
      color: #ffd700;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    .lobby .subtitle {
      color: #aaa;
      margin-bottom: 32px;
      font-style: italic;
    }

    .deck-cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .deck-card {
      background: #16213e;
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 24px;
      width: 280px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .deck-card:hover {
      background: #1a2a50;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(255,215,0,0.2);
    }

    .deck-card h2 { color: #ffd700; margin-bottom: 8px; }
    .deck-card p { color: #aaa; font-size: 0.9rem; }

    .active-games {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    .active-games h3 { color: #ffd700; margin-bottom: 12px; }

    .game-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      background: #1a1a2e;
      margin-bottom: 8px;
    }

    .game-row .status { font-size: 0.8rem; color: #aaa; }
    .join-btn {
      background: #ffd700;
      color: #1a1a2e;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: Georgia, serif;
    }

    .join-btn:hover { background: #ffed4a; }

    .new-game-btn {
      background: transparent;
      border: 2px solid #ffd700;
      color: #ffd700;
      padding: 12px 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-family: Georgia, serif;
      transition: all 0.2s;
    }

    .new-game-btn:hover { background: rgba(255,215,0,0.1); }

    .name-input {
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 1rem;
      font-family: Georgia, serif;
      margin-bottom: 16px;
      width: 100%;
    }

    /* ── Game Board ── */
    .game-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .board {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-area {
      flex: 1;
      position: relative;
      border-bottom: 2px solid #333;
      overflow: hidden;
    }

    .player-area.opponent { background: #0d1117; }
    .player-area.me { background: #111827; }

    .area-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 10;
    }

    .battlefield-card {
      position: absolute;
      width: 60px;
      height: 84px;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.1s;
      z-index: 5;
    }

    .battlefield-card:hover { box-shadow: 0 0 12px rgba(255,215,0,0.5); z-index: 10; }
    .battlefield-card.tapped { transform: rotate(90deg); }
    .battlefield-card img { width: 100%; height: 100%; border-radius: 4px; object-fit: cover; }
    .battlefield-card .face-down {
      width: 100%;
      height: 100%;
      background: #1e3a5f;
      border: 2px solid #2a5298;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .counter-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: #ffd700;
      color: #1a1a2e;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.65rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11;
    }

    /* ── Side Panel ── */
    .side-panel {
      width: 200px;
      background: #0d1117;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      overflow-y: auto;
    }

    .zone-section h4 {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .hand-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .hand-card {
      width: 44px;
      height: 62px;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .hand-card img { width: 100%; height: 100%; border-radius: 3px; object-fit: cover; }
    .hand-card:hover { outline: 2px solid #ffd700; }

    .zone-pill {
      background: #16213e;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .zone-pill:hover { background: #1a2a50; }

    .life-display {
      text-align: center;
      font-size: 2rem;
      color: #ffd700;
      font-weight: bold;
    }

    .life-controls { display: flex; gap: 6px; justify-content: center; }
    .life-btn {
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      font-family: Georgia, serif;
    }

    .life-btn:hover { background: #1a2a50; }

    .action-btn {
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: Georgia, serif;
      width: 100%;
      text-align: left;
    }

    .action-btn:hover { background: #1a2a50; border-color: #ffd700; }

    /* ── Chat ── */
    .chat-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      background: #0a0f1a;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      min-height: 80px;
      max-height: 150px;
    }

    .chat-msg { font-size: 0.75rem; margin-bottom: 4px; }
    .chat-msg .sender { color: #ffd700; }

    .chat-input {
      background: #16213e;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      width: 100%;
      font-family: Georgia, serif;
    }

    /* ── Card Context Menu ── */
    .context-menu {
      position: fixed;
      background: #16213e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 4px;
      z-index: 1000;
      min-width: 160px;
    }

    .context-item {
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .context-item:hover { background: #1a2a50; color: #ffd700; }

    /* ── Card Preview ── */
    .card-preview {
      position: fixed;
      bottom: 20px;
      right: 220px;
      width: 180px;
      z-index: 999;
      pointer-events: none;
    }

    .card-preview img { width: 100%; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); }

    .waiting-banner {
      text-align: center;
      padding: 20px;
      color: #ffd700;
      font-style: italic;
    }

    .drafter-tag {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/app.jsx"></script>
</body>
</html>
